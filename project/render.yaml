# Render Blueprint — 在 Render Dashboard 选择 Blueprint 导入，或手动按 DEPLOY.md 配置
services:
  - type: web
    name: prompt-optimizer
    runtime: python
    rootDir: project
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: FLASK_DEBUG
        value: "0"
      - key: MOCK_AI
        value: "0"
      - key: ENABLE_DB_BACKUP
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-pro
